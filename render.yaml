# Render Static Site — https://render.com/docs/static-sites
services:
  - type: web
    name: seredin999
    runtime: static
    branch: main
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: NODE_VERSION
        value: "20"
    previews:
      generation: automatic
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
